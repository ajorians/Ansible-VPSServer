# Run with
# ansible-playbook SetupPhpMyAdmin.yml
# https://www.phpmyadmin.net/

---
- name: Setup PhpMyAdmin
  hosts: all
  tasks:

  - name: Create directory for data
    file:
      path: "{{ item }}"
      state: directory
      owner: ajorians
      group: users
      mode: 0777
    loop:
      - /opt/DockerSwarmData/phpmyadmin
      - /root/docker
      - /root/docker/phpmyadmin

  - name: Copy the docker-compose file with owner and permissions
    ansible.builtin.copy:
      src: docker-compose.yml
      dest: /root/docker/phpmyadmin
      owner: ajorians
      group: users
      mode: 0777

  - name: Deploy PhpMyAdmin from a compose file
    community.docker.docker_compose_v2:
      project_src: /root/docker/phpmyadmin

  - name: Make Apache VHost file
    ansible.builtin.copy:
      dest: /etc/apache2/vhosts.d/phpmyadmin.conf
      force: false
      content: |
        <VirtualHost *:80>
          ServerName phpmyadmin.orians.org
          ServerAlias phpmyadmin.stage.orians.org phpmyadmin
          ProxyPass / http://127.0.0.1:8500/
          ProxyPassReverse / http://127.0.0.1:8500/
        </VirtualHost>
