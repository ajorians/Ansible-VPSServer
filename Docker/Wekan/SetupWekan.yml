# Run with
# ansible-playbook SetupWekan.yml
# https://wekan.fi/

---
- name: Setup Wekan
  hosts: all
  tasks:

  - name: Create directory for data
    file:
      path: "{{ item }}"
      state: directory
      owner: ajorians
      group: users
      mode: 0777
    loop:
      - /opt/DockerSwarmData/wekan
      - /root/docker
      - /root/docker/wekan

  - name: Copy the docker-compose file with owner and permissions
    ansible.builtin.copy:
      src: docker-compose.yml
      dest: /root/docker/wekan
      owner: ajorians
      group: users
      mode: 0777

  - name: Deploy Kanboard from a compose file
    community.docker.docker_compose_v2:
      project_src: /root/docker/wekan

  - name: Make Apache VHost file
    ansible.builtin.copy:
      dest: /etc/apache2/vhosts.d/wekan.conf
      force: false
      content: |
        <VirtualHost *:80>
          ServerName wekan.orians.org
          ServerAlias wekan.stage.orians.org wekan
          ProxyPass / http://127.0.0.1:3333/
          ProxyPassReverse / http://127.0.0.1:3333/
        </VirtualHost>
    notify:
    - Restart Apache2 service

  handlers:
    - name: Restart Apache2 service
      ansible.builtin.systemd:
        state: restarted
        name: apache2

