# Run with
# ansible-playbook SetupMiniServe.yml
# https://github.com/svenstaro/miniserve

---
- name: Setup MiniServe
  hosts: all
  tasks:

  - name: Create directory for data
    file:
      path: "{{ item }}"
      state: directory
      owner: ajorians
      group: users
      mode: 0777
    loop:
      - /opt/DockerSwarmData/miniserve
      - /root/docker
      - /root/docker/miniserve

  - name: Copy the docker-compose file with owner and permissions
    ansible.builtin.copy:
      src: docker-compose.yml
      dest: /root/docker/miniserve
      owner: ajorians
      group: users
      mode: 0777

  - name: Deploy Miniserve from a compose file
    community.docker.docker_compose_v2:
      project_src: /root/docker/miniserve

  - name: Print some information
    ansible.builtin.debug:
      msg: |
        Port is 9017

  - name: Make Apache VHost file
    ansible.builtin.copy:
      dest: /etc/apache2/vhosts.d/miniserve.conf
      force: false
      content: |
        <VirtualHost *:80>
          ServerName miniserve.orians.org
          ServerAlias miniserve.stage.orians.org miniserve
          ProxyPass / http://127.0.0.1:9017/
          ProxyPassReverse / http://127.0.0.1:9017/
        </VirtualHost>
